services:
  labops-prometheus:
    image: prom/prometheus:latest
    container_name: labops-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - /opt/labops/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/labops/data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - labops-network

  labops-grafana:
    image: grafana/grafana-oss:latest
    container_name: labops-grafana
    restart: unless-stopped
    env_file:
      - /opt/labops/config/grafana/grafana.env
    ports:
      - "3000:3000"
    volumes:
      - /opt/labops/data/grafana:/var/lib/grafana
      - /opt/labops/config/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/labops/config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - labops-network
    depends_on:
      - labops-prometheus

  labops-node-exporter:
    image: prom/node-exporter:latest
    container_name: labops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - labops-network

networks:
  labops-network:
    external: true
