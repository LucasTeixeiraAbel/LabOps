services:
  labops-prometheus:
    image: prom/prometheus:latest
    container_name: labops-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - /opt/labops/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/labops/config/prometheus/rules:/etc/prometheus/rules:ro
      - /opt/labops/data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - labops-network

  labops-grafana:
    image: grafana/grafana-oss:latest
    container_name: labops-grafana
    restart: unless-stopped
    env_file:
      - /opt/labops/config/grafana/grafana.env
    ports:
      - "3000:3000"
    volumes:
      - /opt/labops/data/grafana:/var/lib/grafana
      - /opt/labops/config/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/labops/config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - labops-network
    depends_on:
      - labops-prometheus

  labops-node-exporter:
    image: prom/node-exporter:latest
    container_name: labops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - labops-network

  labops-cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.3
    container_name: labops-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080"
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - labops-network

networks:
  labops-network:
    external: true
