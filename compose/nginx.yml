services:
  labops-nginx:
    image: nginx:alpine
    container_name: labops-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /opt/labops/www:/usr/share/nginx/html:ro
      - /opt/labops/config/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - labops-network

networks:
  labops-network:
    name: labops-network
    driver: bridge
