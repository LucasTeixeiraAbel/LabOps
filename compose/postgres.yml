services:
  labops-postgres:
    image: postgres:16-alpine
    container_name: labops-postgres
    restart: unless-stopped
    env_file:
      - /opt/labops/config/postgres/postgres.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /opt/labops/data/postgres:/var/lib/postgresql/data
      - /opt/labops/backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labops-network

networks:
  labops-network:
    external: true
