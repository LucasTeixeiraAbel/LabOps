server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _ srv.lab localhost 192.168.15.27;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
