<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LabOps</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 40px;
            width: 520px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 8px;
            font-size: 44px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .status {
            background: #022c22;
            color: #86efac;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .info {
            text-align: left;
            background: #020617;
            padding: 16px;
            border-radius: 10px;
            color: #cbd5e1;
        }

        .footer {
            margin-top: 24px;
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>LabOps</h1>
        <div class="subtitle">DevOps Laboratory Platform</div>

        <div class="status">
            Gateway Nginx online
        </div>

        <div class="info">
            <p><strong>Release:</strong> v1.2.0 - Gateway</p>
            <p><strong>Servidor:</strong> srv.lab</p>
            <p><strong>Função:</strong> Reverse Proxy e página inicial</p>
            <p><strong>Status:</strong> Em desenvolvimento</p>
        </div>

        <div class="footer">
            Build. Automate. Learn.
        </div>
    </div>
</body>
</html>
